name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # This pulls the actual LFS files instead of just pointers
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Code Quality Check (Linting)
        run: |
          # Ensures code is clean before deployment
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Configure Git LFS and Identity
        run: |
          git lfs install
          git lfs track "*.joblib"
          git config --global user.email "pvinayv@example.com"
          git config --global user.name "pvinayv"

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Adding the remote using the secret token
          git remote add hf https://pvinayv:$HF_TOKEN@huggingface.co/spaces/pvinayv/tourism-wellness-app
          
          # Force push to resolve any previous binary conflicts
          git push --force hf main
