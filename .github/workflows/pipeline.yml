name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 huggingface_hub

      - name: Code Quality Check (Linting)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Clean Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup Identity
          git config --global user.email "pvinayv@example.com"
          git config --global user.name "pvinayv"
          
          # 2. Initialize Git LFS
          git lfs install
          
          # 3. Create a sibling directory to avoid circular copy errors
          mkdir ../deploy_dir
          cp -r . ../deploy_dir/
          cd ../deploy_dir
          
          # 4. Initialize and force the branch name to 'main'
          git init -b main
          git lfs track "*.joblib"
          git add .gitattributes
          git add .
          git commit -m "MLOps: Automated deployment sync"
          
          # 5. Push to Hugging Face
          # We push the local 'main' branch to the remote 'main' branch
          git remote add hf https://pvinayv:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/pvinayv/tourism-wellness-app
          git push --force hf main:main
