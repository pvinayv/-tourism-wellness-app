name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 huggingface_hub

      - name: Code Quality Check (Linting)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Install and initialize LFS
          git lfs install
          
          # 2. Configure identity
          git config --global user.email "pvinayv@example.com"
          git config --global user.name "pvinayv"
          
          # 3. Create a totally clean sandbox outside the current directory
          mkdir ../deploy_dir
          cp -r . ../deploy_dir/
          cd ../deploy_dir
          
          # 4. Remove the old .git folder to destroy the "bad" binary history
          rm -rf .git
          
          # 5. Initialize fresh and explicitly track LFS before adding files
          git init -b main
          git lfs track "*.joblib"
          git add .gitattributes
          
          # 6. Add all files - the joblib will now only be seen as an LFS pointer
          git add .
          git commit -m "MLOps: Clean deployment bypass for binary restrictions"
          
          # 7. Push using the authenticated remote
          git remote add hf https://pvinayv:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/pvinayv/tourism-wellness-app
          
          # 8. Force push to overwrite the problematic history on the server
          git push --force hf main
