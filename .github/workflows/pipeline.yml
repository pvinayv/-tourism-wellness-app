name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Essential for LFS files to be pulled correctly
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Code Quality Check (Linting)
        run: |
          # Ensures no syntax errors before the heavy lift of deployment
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Install and Configure Git LFS
        run: |
          git lfs install
          # Explicitly track the model file as a binary large object
          git lfs track "*.joblib"
          git config --global user.email "git-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Authenticate and push using the Write Token
          git remote add hf https://pvinayv:$HF_TOKEN@huggingface.co/spaces/pvinayv/tourism-wellness-app
          # Force push ensures GitHub's version overrides the Space exactly
          git push --force hf main
