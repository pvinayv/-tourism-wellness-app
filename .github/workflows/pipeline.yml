name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 huggingface_hub

      - name: Code Quality Check (Linting)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Clean Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup Identity
          git config --global user.email "pvinayv@example.com"
          git config --global user.name "pvinayv"
          
          # 2. Initialize Git LFS
          git lfs install
          
          # 3. Create a temporary deployment directory OUTSIDE the current path
          # We use ../deploy_dir so it is a sibling, not a child
          mkdir ../deploy_dir
          
          # 4. Copy everything into the sibling directory
          cp -r . ../deploy_dir/
          
          # 5. Move into that directory
          cd ../deploy_dir
          
          # 6. Initialize and prepare for push
          git init
          git lfs track "*.joblib"
          git add .gitattributes
          git add .
          git commit -m "MLOps: Full automated deployment including all repository files"
          
          # 7. Push to Hugging Face
          git remote add hf https://pvinayv:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/pvinayv/tourism-wellness-app
          git push --force hf master:main
